<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S1 Mini App - Тест API</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #333; }
        .status { 
            padding: 10px; 
            border-radius: 8px; 
            margin: 10px 0;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover { background: #0056b3; }
        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
        }
        .item {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Тестирование S1 Mini App API</h1>
        
        <div id="status"></div>
        
        <div>
            <button onclick="testBackend()">1️⃣ Тест Backend</button>
            <button onclick="testCategories()">2️⃣ Тест Категории</button>
            <button onclick="testProducts()">3️⃣ Тест Товары</button>
            <button onclick="clearResults()">🗑️ Очистить</button>
        </div>
        
        <div id="results"></div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:5000/api';
        
        function showStatus(message, type) {
            document.getElementById('status').innerHTML = `
                <div class="status ${type}">${message}</div>
            `;
        }
        
        function addResult(title, data) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML += `
                <div class="item">
                    <h3>${title}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
            `;
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('status').innerHTML = '';
        }
        
        async function testBackend() {
            try {
                const response = await fetch('http://localhost:5000/');
                if (response.ok) {
                    showStatus('✅ Backend работает!', 'success');
                    addResult('Backend Status', {
                        status: response.status,
                        message: 'Backend доступен'
                    });
                } else {
                    showStatus('❌ Backend не отвечает', 'error');
                }
            } catch (error) {
                showStatus('❌ Ошибка подключения к backend: ' + error.message, 'error');
            }
        }
        
        async function testCategories() {
            try {
                // Создаем фейковый Telegram initData для теста
                const fakeInitData = 'user=%7B%22id%22%3A123456789%2C%22first_name%22%3A%22Test%22%7D&hash=abcdef';
                
                const response = await fetch(`${API_BASE_URL}/categories`, {
                    headers: {
                        'X-Telegram-Init-Data': fakeInitData
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus(`✅ Категории загружены! Найдено: ${data.data.length}`, 'success');
                    addResult('Категории', data);
                } else {
                    showStatus('❌ Ошибка загрузки категорий: ' + (data.error || 'Неизвестная ошибка'), 'error');
                    addResult('Error', data);
                }
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        async function testProducts() {
            try {
                const fakeInitData = 'user=%7B%7B%22id%22%3A123456789%2C%22first_name%22%3A%22Test%22%7D%7D&hash=abcdef';
                
                const response = await fetch(`${API_BASE_URL}/products?limit=5`, {
                    headers: {
                        'X-Telegram-Init-Data': fakeInitData
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus(`✅ Товары загружены! Найдено: ${data.data.length}, Всего: ${data.total}`, 'success');
                    addResult('Товары (первые 5)', data);
                } else {
                    showStatus('❌ Ошибка загрузки товаров: ' + (data.error || 'Неизвестная ошибка'), 'error');
                    addResult('Error', data);
                }
            } catch (error) {
                showStatus('❌ Ошибка: ' + error.message, 'error');
            }
        }
        
        // Автоматический тест при загрузке
        window.onload = () => {
            showStatus('ℹ️ Нажмите кнопку для теста API', 'info');
        };
    </script>
</body>
</html>
