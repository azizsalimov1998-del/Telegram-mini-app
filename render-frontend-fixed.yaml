services:
  # Frontend Service - Static Site
  - type: static
    name: safar-frontend
    region: frankfurt
    plan: starter
    buildCommand: cd s1-mini-app && npm install && npm run build
    staticPublishPath: ./s1-mini-app/dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        sync: false
