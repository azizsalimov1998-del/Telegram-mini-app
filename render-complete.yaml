services:
  # Backend API Service
  - type: web
    name: safar-backend
    env: python
    region: frankfurt
    plan: starter
    disk:
      name: safar-data
      mountPath: /data
      sizeGB: 5
    buildCommand: pip install -r web_admin/requirements.txt
    startCommand: ./start.sh
    autoDeploy: true
    healthCheckPath: /api/categories
    timeoutSeconds: 120
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: DB_FILENAME
        value: shop_bot.db
      - key: ENVIRONMENT
        value: production
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_NAME
        value: admin
      - key: DISABLE_MINI_APP_AUTH
        value: false
      - key: CORS_ORIGINS
        sync: false

  # Frontend Service - Static Site
  - type: static
    name: safar-frontend
    region: frankfurt
    plan: starter
    buildCommand: cd s1-mini-app && npm install && npm run build
    staticPublishPath: ./s1-mini-app/dist
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: VITE_API_URL
        sync: false
